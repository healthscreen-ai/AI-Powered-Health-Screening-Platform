services:
  db:
    image: postgres:15
    container_name: healthscreen-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: healthdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.backend
    container_name: healthscreen-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: healthscreen-frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
